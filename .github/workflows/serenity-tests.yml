name: BabyRefil - Testes Automatizados

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Permite disparar manualmente pela aba "Actions" no GitHub
  workflow_dispatch:

jobs:
  testes:
    name: Executar Testes Serenity
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Java 8 (versão usada no projeto)
      - name: Configurar Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 3. Instala Chrome + ChromeDriver compatíveis no runner Linux
      - name: Configurar Chrome e ChromeDriver
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      # 4. Executa os testes via Maven em modo headless
      #    - sobrescreve o chromedriver local (lib/chromedriver.exe é Windows)
      #    - passa as switches de headless via propriedade do Maven
      - name: Executar testes BabyRefil
        run: |
          mvn verify \
            -Dwebdriver.driver=chrome \
            -Dwebdriver.chrome.driver=$(which chromedriver) \
            -Dchrome.switches="--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080,--disable-infobars"

      # 5. Publica o resumo Serenity direto na tela do workflow run (Job Summary)
      - name: Publicar resumo Serenity no Job Summary
        if: always()
        run: |
          echo "## Resultado dos testes Serenity" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat target/site/serenity/summary.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "summary.txt nao encontrado" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # 6. Publica os resultados JUnit/Failsafe como check run com detalhes por cenario
      #    (aparece direto na aba "Checks" do run e no Job Summary, sem precisar baixar nada)
      - name: Publicar relatorio de testes (JUnit)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'target/failsafe-reports/TEST-*.xml'
          check_name: 'Resultado dos testes BabyRefil'
          fail_on_failure: false
          require_tests: true

      # 7. Publica o relatório Serenity completo como artefato para download
      #    (sempre publica, mesmo se os testes falharem)
      - name: Publicar relatório Serenity como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-serenity-${{ github.run_number }}
          path: target/site/serenity/
          retention-days: 30

      # 8. (Opcional) Publica o relatório no GitHub Pages
      #    Requisito: habilitar GitHub Pages no repositório com source = branch "gh-pages"
      - name: Publicar relatório no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/serenity/
          destination_dir: relatorio
