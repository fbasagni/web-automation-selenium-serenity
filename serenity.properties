# Define the test driver
webdriver.driver=chrome
# webdriver.chrome.driver gerenciado automaticamente pelo WebDriverManager (Hooks.java)
# Para execução local com driver fixo: webdriver.chrome.driver=lib/chromedriver.exe
chrome.switches=--disable-infobars --disable-popup-blocking --disable-geolocation
#chrome.switches=--disable-infobars --headless --disable-gpu --window-size=1440,900, --disable-extensions --silent-launch --disable-popup-blocking

serenity.browser.maximized=true
webdriver.wait.for.timeout=90000

# Reaproveita a mesma instancia do navegador entre os cenarios do mesmo arquivo .feature,
# evitando o custo de reabrir o Chrome a cada cenario (cada cenario ainda navega/reresulta
# seu proprio fluxo, mas sem pagar o tempo de start up do browser novamente)
restart.browser.for.each = feature

serenity.console.colors = true

serenity.take.screenshots = FOR_FAILURES
#serenity.take.screenshots = AFTER_EACH_STEP

# Appears at the top of the reports
serenity.project.name = BabyRefil - Automação de Testes

# Root package for any JUnit acceptance tests
#serenity.test.root=net.thucydides.showcase.junit.features

# Customise your requirements hierarchy
#serenity.requirement.types=feature, story

# Run the tests without calling webdriver - useful to check your Cucumber wiring
#serenity.dry.run=true

# Customise browser size
serenity.browser.height = 1080
serenity.browser.width = 1920
